nameOverride: svc-media

replicaCount: 1

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-media
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-media
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector-stg.platform-stg.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
    - name: OIDC_ISSUER
      valueFrom:
        configMapKeyRef:
          name: platform-identity-stg
          key: OIDC_ISSUER
    - name: OIDC_AUDIENCE
      valueFrom:
        configMapKeyRef:
          name: platform-identity-stg
          key: ENV_API_AUDIENCE
  envFrom:
    - configMapRef:
        name: svc-media-stg-config
    - secretRef:
        name: svc-media-stg-secrets
        optional: true

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4003

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api-stg.mereb.app
      paths:
        - path: /media
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: media-stg-tls
      hosts:
        - api-stg.mereb.app

configMap:
  enabled: true
  nameOverride: svc-media-stg-config
  data:
    PORT: "4003"
    MEDIA_EVENTS_ENABLED: "true"
    KAFKA_BROKERS: platform-stg-redpanda-0.platform-stg-redpanda.platform-stg.svc.cluster.local:9092
    KAFKA_SSL: "true"
    KAFKA_SSL_INSECURE: "true"
    S3_ENDPOINT: http://platform-stg-minio.platform-stg.svc.cluster.local:9000
    S3_REGION: us-east-1
    S3_BUCKET: media-stg
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-stg

resources:
  requests:
    cpu: 15m
    memory: 96Mi
  limits:
    cpu: 150m
    memory: 256Mi
