nameOverride: svc-media

replicaCount: 1

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-media
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-media
  envFrom:
    - configMapRef:
        name: svc-media-dev-config
    - secretRef:
        name: svc-media-dev-secrets
        optional: true

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4003

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api-dev.mereb.app
      paths:
        - path: /media
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: media-dev-tls
      hosts:
        - api-dev.mereb.app

configMap:
  enabled: true
  nameOverride: svc-media-dev-config
  data:
    PORT: "4003"
    OIDC_ISSUER: https://auth.mereb.app/realms/mereb
    OIDC_AUDIENCE: mereb-dev
    S3_ENDPOINT: http://platform-dev-minio.platform-dev.svc.cluster.local:9000
    S3_REGION: us-east-1
    S3_BUCKET: media-dev

resources:
  requests:
    cpu: 75m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 512Mi
