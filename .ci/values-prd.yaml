nameOverride: svc-media

replicaCount: 2

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-media
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-media
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector.platform-prd.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
    - name: OIDC_ISSUER
      valueFrom:
        configMapKeyRef:
          name: platform-identity-prd
          key: OIDC_ISSUER
    - name: OIDC_AUDIENCE
      valueFrom:
        configMapKeyRef:
          name: platform-identity-prd
          key: ENV_API_AUDIENCE
  envFrom:
    - configMapRef:
        name: svc-media-prd-config
    - secretRef:
        name: svc-media-secrets
        optional: true

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4003

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api.mereb.app
      paths:
        - path: /media
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: media-prd-tls
      hosts:
        - api.mereb.app

configMap:
  enabled: true
  nameOverride: svc-media-prd-config
  data:
    PORT: "4003"
    MEDIA_EVENTS_ENABLED: "true"
    KAFKA_BROKERS: platform-prd-redpanda-0.platform-prd-redpanda.platform-prd.svc.cluster.local:9092,platform-prd-redpanda-1.platform-prd-redpanda.platform-prd.svc.cluster.local:9092,platform-prd-redpanda-2.platform-prd-redpanda.platform-prd.svc.cluster.local:9092
    KAFKA_SSL: "true"
    KAFKA_SSL_INSECURE: "true"
    S3_ENDPOINT: http://platform-prd-minio.platform-prd.svc.cluster.local:9000
    S3_REGION: us-east-1
    S3_BUCKET: media
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-prd

resources:
  requests:
    cpu: 75m
    memory: 224Mi
  limits:
    cpu: 450m
    memory: 640Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
